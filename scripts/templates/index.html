<!DOCTYPE html>
<html>
<head>
    <title>Triple Extraction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🧠 Hindi Triple Extraction</h1>

    <form method="POST">
        <textarea name="sentence" placeholder="Enter Hindi sentence..." required></textarea>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
<div class="result">
    <h2>🔍 Extracted Triple</h2>
    <p>🧩 <strong>Subject:</strong> {{ result.subject }}</p>
    <p>🔗 <strong>Predicate:</strong> {{ result.predicate }}</p>
    <p>🎯 <strong>Object:</strong> {{ result.object }}</p>
</div>
{% endif %}
</div>

</body>
</html>
